<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="todoapp">
        <header class="header">
            <h1>todos</h1>
            <form id="todoForm">
                <input id="todoInput" class="new-todo" placeholder="Bạn cần làm gì?" autocomplete="off" autofocus>
            </form>
        </header>

        <main class="main" id="main-content">
            <ul class="todo-list" id="todoList">
                </ul>
        </main>

        <footer class="footer" id="footer">
            <span class="todo-count" id="todoCount"><strong>0</strong> items left</span>
            <ul class="filters" id="filters">
                <li><a href="#/" class="selected" data-filter="all">All</a></li>
                <li><a href="#/active" data-filter="active">Active</a></li>
                <li><a href="#/completed" data-filter="completed">Completed</a></li>
            </ul>
            <button class="clear-completed" id="clearCompleted">Clear completed</button>
        </footer>
    </section>

    <script src="app.js"></script>
</body>
</html>
